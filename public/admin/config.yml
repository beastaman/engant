backend:
  name: github
  repo: beastaman/engant
  branch: main
  base_url: https://engant.com
  auth_endpoint: api/decap/auth

logo_url: "https://engant.com/images/logo.png"
site_url: "https://engant.com"
display_url: "https://engant.com"

publish_mode: simple
media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD", default: "" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["ai", "robotics", "space", "cybersecurity", "biotech", "quantum-computing", "climate-tech", "gadgets", "software", "neurotech"]
      - label: "Author"
        name: "author"
        widget: "relation"
        collection: "authors"
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Trending", name: "trending", widget: "boolean", default: false }
      - label: "Post of the Week"
        name: "post_of_the_week"
        widget: "boolean"
        default: false
        hint: "Only set this on ONE post at a time — it drives the homepage spotlight."
        required: false
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "authors"
    label: "Authors"
    folder: "content/author"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", media_folder: "/public/images/author", public_folder: "/images/author" }
      - { label: "Bio", name: "body", widget: "markdown" }

  - name: "videos"
    label: "Video Posts"
    folder: "content/videos"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD", default: "" }
      - { label: "Body", name: "body", widget: "markdown" }
